<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP AI Assistant</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); 
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
}
.chat{
width:100%;
max-width:420px;
height:85dvh;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
overflow:hidden;
}
.header{
padding:14px;
text-align:center;
font-weight:600;
color:#fff;
border-bottom:1px solid rgba(255,255,255,0.1);
}
.messages{
flex:1;
padding:12px;
overflow-y:auto;
}
.msg{margin:10px 0;display:flex;}
.user{justify-content:flex-end;}
.bot{justify-content:flex-start;}
.bubble{
padding:10px 14px;
border-radius:14px;
max-width:80%;
font-size:14px;
line-height:1.4;
}
.user .bubble{background:#4facfe;color:#fff;}
.bot .bubble{background:rgba(255,255,255,0.15);color:#fff;}
.input{
display:flex;
padding:10px;
gap:8px;
border-top:1px solid rgba(255,255,255,0.1);
}
input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.15);
color:#fff;
}
button{
background:#4facfe;
color:#fff;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}
.download{
display:inline-block;
margin-top:6px;
padding:5px 8px;
background:#00c853;
color:#fff;
text-decoration:none;
border-radius:6px;
font-size:12px;
}
</style>
</head>

<body>

<div class="chat">
<div class="header">SAP AI Assistant</div>

<div class="messages" id="msg"></div>

<div class="input">
<input id="input" placeholder="Ask SAP SD...">
<button onclick="send()">Send</button>
</div>
</div>

<script>

const API_KEY = "YOUR_GEMINI_API_KEY"; // 🔑 add your key

const msg=document.getElementById("msg");
const input=document.getElementById("input");

/* 💾 LOAD HISTORY */
window.onload = () => {
  const history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.forEach(m => add(m.text, m.type, false));
};

/* 💾 SAVE HISTORY */
function save(text,type){
  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
  history.push({text,type});
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

/* 💬 ADD MESSAGE */
function add(text,type,saveIt=true){
let d=document.createElement("div");
d.className="msg "+type;
d.innerHTML=`<div class="bubble">${text}</div>`;
msg.appendChild(d);
msg.scrollTop=msg.scrollHeight;
if(saveIt) save(text,type);
}

/* ⌨️ TYPING EFFECT */
function typeText(text){
let d=document.createElement("div");
d.className="msg bot";
let bubble=document.createElement("div");
bubble.className="bubble";
d.appendChild(bubble);
msg.appendChild(d);

let i=0;
let interval=setInterval(()=>{
  bubble.innerHTML += text.charAt(i);
  i++;
  msg.scrollTop=msg.scrollHeight;
  if(i>=text.length) clearInterval(interval);
},15);

save(text,"bot");
}

/* 🚀 SEND */
async function send(){

let q=input.value.trim();
if(!q) return;

add(q,"user");
input.value="";

/* loading */
let loading=document.createElement("div");
loading.className="msg bot";
loading.innerHTML=`<div class="bubble">Typing...</div>`;
msg.appendChild(loading);
msg.scrollTop=msg.scrollHeight;

try{

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[
{
parts:[{
text:`You are an SAP SD expert assistant.

Rules:
- Answer only SAP SD related queries
- Be short and clear
- Provide step-by-step when needed
- If not SAP, say: "I support SAP SD topics only"

User: ${q}`
}]
}
]
})
}
);

const data = await res.json();
msg.removeChild(loading);

let aiText =
data.candidates?.[0]?.content?.parts?.[0]?.text ||
"No response";

/* typing animation */
typeText(aiText.replace(/\n/g,"<br>"));

}catch(e){
msg.removeChild(loading);
add("AI error. Try again.","bot");
}
}

/* ENTER KEY */
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
